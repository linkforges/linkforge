version: 2
updates:
  # PHP / Composer — one grouped PR per week for all updates.
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "php"]
    groups:
      composer:
        patterns: ["*"]

  # Front-end / npm — one grouped PR per week for all updates
  # (keeps coupled bumps like vite + laravel-vite-plugin together so CI validates them as a set).
  # The repo's .npmrc pins the public registry so Dependabot doesn't try GitHub Packages auth.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript"]
    groups:
      npm:
        patterns: ["*"]

  # GitHub Actions — one grouped PR per week for all workflow action bumps.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "github-actions"]
    groups:
      actions:
        patterns: ["*"]
